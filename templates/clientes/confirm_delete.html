{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Excluir Produto</h1>
    <p>Tem certeza que deseja excluir <strong>{{ object.nome }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirmar</button>
        <a href="{% url 'lista_produtos' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
